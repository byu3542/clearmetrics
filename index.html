<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearMetrics — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ─────────────────────────────────────────────
   HOW TO CONFIGURE A NEW CLIENT
   ─────────────────────────────────────────────
   1. Create a tab in your Google Sheet named
      exactly as the client key below (e.g. "rxfit")
   2. Publish the Sheet:
        File → Share → Publish to web → CSV → Entire document
      Copy the Sheet ID from the URL (the long string between /d/ and /edit)
   3. Add the client to CLIENT_REGISTRY below
   4. Access via: dashboard.html?client=rxfit
   ──────────────────────────────────────────── */

:root {
  --bg:        #0d0f12;
  --surface:   #13161b;
  --card:      #181c22;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e8eaf0;
  --muted:     #7a8190;
  --dim:       #4a5060;
  --blue:      #3b82f6;
  --blue-dim:  rgba(59,130,246,0.15);
  --green:     #22c55e;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --teal:      #14b8a6;
  --radius:    12px;
  --radius-sm: 7px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:28px 0;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{padding:32px;overflow:auto;}

.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.logo-name{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.logo-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);}
.nav-item.active{color:var(--text);background:rgba(59,130,246,.1);border-left-color:var(--blue);}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0;}
.nav-section{padding:20px 20px 6px;font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;font-family:'DM Mono',monospace;}
.sidebar-footer{margin-top:auto;padding:20px;border-top:1px solid var(--border);}
.client-badge{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;}
.client-name{font-size:12px;font-weight:500;}
.client-meta{font-size:11px;color:var(--muted);margin-top:2px;}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:600;letter-spacing:-.4px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.period-pill{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
.sample-tag{background:rgba(245,158,11,.15);color:var(--amber);border-radius:4px;padding:2px 8px;font-size:11px;font-family:'DM Mono',monospace;}
.live-tag{background:rgba(34,197,94,.15);color:var(--green);border-radius:4px;padding:2px 8px;font-size:11px;font-family:'DM Mono',monospace;}

.datasource-bar{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.dot-pulse{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite;}
.dot-green{background:var(--green);}
.dot-amber{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;animation:fadeUp .3s ease both;}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:8px;}
.kpi-value{font-size:28px;font-weight:600;letter-spacing:-.5px;line-height:1;}
.kpi-sub{font-size:12px;margin-top:6px;}
.up{color:var(--green);}
.warn{color:var(--amber);}
.down{color:var(--red);}
.neutral{color:var(--muted);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;animation:fadeUp .35s ease both;}
.card-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:16px;}

.stream-row{margin-bottom:16px;}
.stream-row:last-child{margin-bottom:0;}
.stream-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.stream-name{font-size:13px;font-weight:500;}
.stream-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}
.bar-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.stream-meta{font-size:11px;color:var(--dim);}

.slot-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slot-row:last-of-type{margin-bottom:0;}
.slot-time{font-size:12px;font-family:'DM Mono',monospace;width:68px;flex-shrink:0;color:var(--muted);}
.slot-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.slot-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.slot-pct{font-size:12px;font-family:'DM Mono',monospace;width:38px;text-align:right;font-weight:500;}
.slot-note{font-size:11px;color:var(--amber);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}

.coach-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.coach-row:last-of-type{border-bottom:none;padding-bottom:0;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.coach-info{flex:1;min-width:0;}
.coach-name{font-size:13px;font-weight:500;}
.coach-meta{font-size:11px;color:var(--dim);margin-top:1px;}
.coach-rev{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;margin-right:8px;}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.04em;font-family:'DM Mono',monospace;}
.badge-top{background:rgba(34,197,94,.15);color:var(--green);}
.badge-warn{background:rgba(245,158,11,.15);color:var(--amber);}
.coach-note{font-size:11px;color:var(--amber);margin-top:12px;padding:10px 12px;background:rgba(245,158,11,.06);border-radius:var(--radius-sm);border:1px solid rgba(245,158,11,.15);}

.pace-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);}
.pace-row:last-of-type{border-bottom:none;}
.pace-label{font-size:13px;color:var(--muted);}
.pace-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}
.pace-track{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:14px 0 6px;}
.pace-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.pace-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;}
.retention-row{display:flex;gap:20px;margin:14px 0 10px;flex-wrap:wrap;}
.ret-item{font-size:13px;}
.sub-title{font-size:11px;color:var(--dim);margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;}
.nutr-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
.nutr-row:last-child{border-bottom:none;}
.nutr-meta{font-size:11px;color:var(--dim);}

.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;animation:fadeUp .4s ease both;}
.chart-legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.dash-footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;flex-wrap:wrap;gap:8px;}

/* ── loading skeleton ── */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-block{border-radius:6px;height:16px;margin-bottom:8px;}

/* ── error state ── */
.error-card{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius);padding:24px;text-align:center;color:var(--red);}
.error-card h3{font-size:15px;margin-bottom:8px;}
.error-card p{font-size:13px;color:var(--muted);line-height:1.7;}
.error-card code{font-family:'DM Mono',monospace;font-size:11px;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;}

/* ── not found state ── */
.notfound{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;text-align:center;}
.notfound h2{font-size:20px;font-weight:600;}
.notfound p{font-size:13px;color:var(--muted);max-width:380px;line-height:1.7;}
.client-list{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.client-chip{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:4px 14px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--blue);}
.client-chip:hover{background:var(--blue-dim);}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.kpi-card:nth-child(2){animation-delay:.06s;}
.kpi-card:nth-child(3){animation-delay:.12s;}
.kpi-card:nth-child(4){animation-delay:.18s;}

/* ═══════════════════════════════════════════════════════════════════
   MULTI-LOCATION STYLES
═══════════════════════════════════════════════════════════════════ */
.location-selector-container{margin-bottom:20px;}
.location-selector{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;animation:fadeUp .35s ease both;}
.location-selector-header{margin-bottom:12px;}
.location-label{display:block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px;}
.location-pills{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.location-pill{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-family:'DM Sans';transition:all .2s ease;}
.location-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.location-pill.active{background:var(--blue);border-color:var(--blue);color:white;}
.location-meta{font-size:12px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:12px;margin-top:8px;}
.location-address{color:var(--text);margin-bottom:4px;font-weight:500;}
.location-contact{color:var(--muted);}

/* Schedule Grid Styles */
.schedule-container{overflow-x:auto;border-radius:var(--radius);}
.schedule-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.schedule-table thead{background:var(--surface);}
.schedule-table th{padding:12px;text-align:left;font-size:12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
.schedule-table td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;}
.schedule-table tbody tr:last-child td{border-bottom:none;}
.schedule-time-cell{background:var(--surface);font-weight:500;color:var(--text);font-family:'DM Mono',monospace;white-space:nowrap;min-width:80px;}
.schedule-class-cell{vertical-align:top;background:var(--card);}
.schedule-class{padding:4px 0;}
.class-name{font-weight:600;color:var(--text);margin-bottom:2px;}
.class-instructor{font-size:11px;color:var(--muted);margin-bottom:2px;}
.class-capacity{font-size:11px;color:var(--dim);margin-bottom:2px;}
.class-duration{font-size:10px;color:var(--muted);opacity:.7;}

/* Pricing Grid Styles */
.pricing-section{animation:fadeUp .35s ease both;}
.pricing-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:28px;}
.pricing-grid-small{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:28px;}
.pricing-card,.pricing-card-small{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;transition:all .2s ease;}
.pricing-card:hover,.pricing-card-small:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(0,0,0,.2);}
.pricing-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px;}
.pricing-name{font-weight:600;color:var(--text);font-size:13px;}
.pricing-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;white-space:nowrap;}
.pricing-price{font-size:24px;font-weight:700;color:var(--blue);margin-bottom:8px;line-height:1;}
.pricing-frequency{font-size:12px;color:var(--muted);font-weight:400;margin-left:4px;}
.pricing-features{list-style:none;font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:0;flex-grow:1;}
.pricing-features li{margin-bottom:6px;}
.pricing-features li:before{content:'✓ ';color:var(--green);font-weight:600;margin-right:6px;}
.pricing-description{font-size:12px;color:var(--muted);margin:0;margin-top:auto;}
.no-data{padding:24px;text-align:center;color:var(--muted);font-size:13px;}

</style>
</head>
<body>
<div class="shell">

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-name">ClearMetrics</div>
    <div class="logo-sub">analytics platform</div>
  </div>
  <div class="nav-section">Overview</div>
  <div class="nav-item active" data-page="dashboard">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
    Dashboard
  </div>
  <div class="nav-item" data-page="revenue">

  <div class="nav-item" data-page="staff">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>

  <div class="nav-section">Reports</div>

  </div>
  <div class="nav-item" data-page="memberships">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="5" r="3"/><path d="M1 13c0-2.2 1.8-4 4-4s4 1.8 4 4"/><circle cx="12" cy="5" r="2.5"/><path d="M9 12.5c0-1.8 1.3-3.3 3-3.3s3 1.5 3 3.3"/></svg>

  </div>

    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="7"/><path d="M8 4v4l3 2"/></svg>

  </div>
  <div class="nav-section">Settings</div>

  <div class="sidebar-footer">
    <div class="client-badge">
      <div class="client-name" id="sb-client-name">—</div>
      <div class="client-meta" id="sb-client-meta">Loading…</div>

  </div>
</aside>

<!-- ── Main ── -->
<main class="main" id="main-content">
  <!-- rendered by JS -->
</main>

<script>
/* ═══════════════════════════════════════════════════════════════════
   CLIENT REGISTRY
   Add a new client by adding an entry here. Keys must be lowercase,
   no spaces. The sheetId is the long ID in your Google Sheet URL.

   Sheet tab naming convention (each tab = one data type):
     "{clientKey}_kpi"       → 4 rows: metric, value, sub, subClass
     "{clientKey}_streams"   → rows: name, value, pct, meta, color
     "{clientKey}_slots"     → rows: time, fillPct, fillClass
     "{clientKey}_coaches"   → rows: initials, name, meta, revenue, badge, avatarStyle
     "{clientKey}_pace"      → rows: key=value pairs (see SHEET FORMAT below)
     "{clientKey}_daily"     → rows: day, memberships, pt, nutrition, dropins

   If no sheetId is set, the dashboard uses built-in sample data.
═══════════════════════════════════════════════════════════════════ */
const CLIENT_REGISTRY = {
  rxfit: {
    name:     'RxFIT Gym',
    location: 'Spanish Fork, UT',
    plan:     'Starter',
    // TO ACTIVATE LIVE DATA: paste your Google Sheet ID below
    // sheetId: 'YOUR_GOOGLE_SHEET_ID_HERE',
    sheetId: null,   // null = use sample data
  },
  // ── Add future clients below ──────────────────────────────────────
  // kabuto: {
  //   name:    'Kabuto Sushi & Ramen',
  //   location:'Spanish Fork, UT',
  //   plan:    'Growth',
  //   sheetId: 'YOUR_SHEET_ID',
  // },
  // dickerson: {
  //   name:    'Dickerson Automotive',
  //   location:'Spanish Fork, UT',
  //   plan:    'Starter',
  //   sheetId: 'YOUR_SHEET_ID',
  // },
};

/* ═══════════════════════════════════════════════════════════════════
   LOCATION REGISTRY (Multi-Location Support)
   Maps client keys to their physical locations
═══════════════════════════════════════════════════════════════════ */
const LOCATION_REGISTRY = {
  rxfit: [
    { key: 'all', name: 'All Locations', address: 'Combined view across all RxFIT locations', phone: 'N/A', hours: 'N/A', maxCapacity: 300 },
    { key: 'holladay', name: 'RxFIT Holladay', address: '2345 E Murray Holladay Rd, Holladay, UT 84121', phone: '(801) 555-0101', hours: '5 AM–9 PM', maxCapacity: 120 },
    { key: 'orem', name: 'RxFIT Orem', address: '456 W Center St, Orem, UT 84057', phone: '(801) 555-0102', hours: '5 AM–9 PM', maxCapacity: 100 },
    { key: 'spanish_fork', name: 'RxFIT Spanish Fork', address: '789 S Main St, Spanish Fork, UT 84663', phone: '(801) 555-0103', hours: '6 AM–8 PM', maxCapacity: 80 },
  ],
  // Future clients: kabuto, dickerson, etc.
};

/* ═══════════════════════════════════════════════════════════════════
   HARDCODED RXFIT DATA (Location-Specific)
   Includes schedules, pricing, and metadata for each location
   Future: Replace with Google Sheets data if {clientKey}_{locationKey}_* tabs exist
═══════════════════════════════════════════════════════════════════ */
const RXFIT_DATA = {
  locations: {
    holladay: {

/* ═══════════════════════════════════════════════════════════════════
   GOOGLE SHEETS FETCH
   Reads a published CSV sheet and parses key=value rows.
   Tab naming: "{clientKey}_pace", "{clientKey}_kpi", etc.
═══════════════════════════════════════════════════════════════════ */
async function fetchSheetTab(sheetId, tabName) {
  // Google's published CSV URL format
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet tab "${tabName}" not found (HTTP ${res.status})`);
  const text = await res.text();
  // Parse CSV rows, strip quotes
  return text.trim().split('\n').map(row =>
    row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim())
  );
}

function parseKpi(rows) {
  // Expected columns: metric | value | sub | subClass
  return rows.slice(1).map(r => ({ label:r[0], value:r[1], sub:r[2], subClass:r[3] }));
}
function parseStreams(rows) {
  return rows.slice(1).map(r => ({ name:r[0], value:r[1], pct:Number(r[2]), meta:r[3], color:r[4] }));
}
function parseSlots(rows) {
  return rows.slice(1).map(r => ({ time:r[0], pct:Number(r[1]), cls:r[2] }));
}
function parseCoaches(rows) {
  return rows.slice(1).map(r => ({
    initials:r[0], name:r[1], meta:r[2], revenue:r[3],
    badge:r[4]||null, badgeClass:r[5]||'',
    avatarBg:r[6], avatarColor:r[7]
  }));
}
function parsePace(rows) {
  // key=value rows (no header): goal, earned, projected, projClass, pct, retNew, retCancel, retNet, retRate
  // Then topItems rows: item_name | meta
  const kv = {};
  const topItems = [];
  let inItems = false;
  rows.forEach(r => {
    if (r[0] === 'top_item') { topItems.push({ name:r[1], meta:r[2] }); return; }
    if (r[0]) kv[r[0]] = r[1];
  });
  kv.pct = Number(kv.pct);
  kv.topItems = topItems;
  return kv;
}
function parseDaily(rows) {
  // Columns: day | memberships | pt | nutrition | dropins
  const data = { labels:[], memberships:[], pt:[], nutrition:[], dropins:[] };
  rows.slice(1).forEach(r => {
    data.labels.push(r[0]);
    data.memberships.push(Number(r[1]));
    data.pt.push(Number(r[2]));
    data.nutrition.push(Number(r[3]));
    data.dropins.push(Number(r[4]));
  });
  return data;
}

async function loadLiveData(clientKey, sheetId) {
  const tabs = ['kpi','streams','slots','coaches','pace','daily'];
  const results = await Promise.allSettled(
    tabs.map(t => fetchSheetTab(sheetId, `${clientKey}_${t}`))
  );
  const [kpiR, streamsR, slotsR, coachesR, paceR, dailyR] = results;

  return {
    period:    'Live data',
    syncTime:  'Synced just now',
    kpis:      kpiR.status === 'fulfilled'     ? parseKpi(kpiR.value)         : SAMPLE_DATA.kpis,
    streams:   streamsR.status === 'fulfilled' ? parseStreams(streamsR.value) : SAMPLE_DATA.streams,
    slots:     slotsR.status === 'fulfilled'   ? parseSlots(slotsR.value)     : SAMPLE_DATA.slots,
    slotNote:  SAMPLE_DATA.slotNote,
    coaches:   coachesR.status === 'fulfilled' ? parseCoaches(coachesR.value): SAMPLE_DATA.coaches,
    coachNote: SAMPLE_DATA.coachNote,
    pace:      paceR.status === 'fulfilled'    ? parsePace(paceR.value)       : SAMPLE_DATA.pace,
    daily:     dailyR.status === 'fulfilled'   ? parseDaily(dailyR.value)     : SAMPLE_DATA.daily,
  };
}

function $c(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'cls') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k === 'style') el.style.cssText = v;
    else el.setAttribute(k, v);
  });
  children.forEach(c => { if (c) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}
function fmt$(n) { return '$' + Math.round(n).toLocaleString(); }

// Aggregate membership data across all locations
function aggregateMembershipData(clientKey, locationKey) {
  if (locationKey !== 'all' || clientKey !== 'rxfit') {
    return null;
  }

  const locations = ['holladay', 'orem', 'spanish_fork'];
  const aggregated = {};

  // Sum membership tiers across all locations
  const membershipTiers = ['3x_week', 'unlimited', 'vip', 'commitment_3m', 'commitment_6m', 'commitment_12m'];
  membershipTiers.forEach(tier => {
    const tierData = { currentMembers: 0, mrr: 0, trend: 'up', trendPercent: 0 };
    let totalMembers = 0;
    let totalChurn = 0;

    locations.forEach(loc => {
      const locTier = RXFIT_DATA.locations[loc].membershipPerformance[tier];
      if (locTier) {
        totalMembers += locTier.currentMembers;
        tierData.currentMembers += locTier.currentMembers;
        // Parse MRR (handle both numeric and string formats)
        const mrrNum = typeof locTier.mrr === 'number' ? locTier.mrr : parseInt(locTier.mrr.replace(/[^0-9]/g, ''));
        tierData.mrr += mrrNum;
        totalChurn += locTier.currentMembers * (RXFIT_DATA.locations[loc].churnByTier[tier] || 0);
      }
    });

    if (tierData.currentMembers > 0) {
      tierData.mrr = '$' + tierData.mrr.toLocaleString();
      tierData.name = RXFIT_DATA.locations['holladay'].membershipPerformance[tier]?.name || tier;
      tierData.arpu = RXFIT_DATA.locations['holladay'].membershipPerformance[tier]?.arpu || '$0';
      tierData.badgeLabel = RXFIT_DATA.locations['holladay'].membershipPerformance[tier]?.badgeLabel || '';
      aggregated[tier] = tierData;
    }
  });

  return aggregated;
}

// Aggregate add-on performance across all locations
function aggregateAddOnPerformance(clientKey) {
  if (clientKey !== 'rxfit') return null;

  const locations = ['holladay', 'orem', 'spanish_fork'];
  const addOns = {
    dropIn: { name: 'Drop-in Class', price: 20, totalRevenue: 0, transactions: 0, redemptionRate: 0, percentOfTotal: 0 },
    punchPass: { name: '5-Session Punch Pass', price: 75, totalRevenue: 0, sold: 0, redeemed: 0, redemptionRate: 0, expired: 0, percentOfTotal: 0 }
  };

  let grandTotal = 0;

  locations.forEach(loc => {
    const addOnData = RXFIT_DATA.locations[loc].addOnPerformance;
    if (addOnData) {
      addOns.dropIn.totalRevenue += addOnData.dropIn.totalRevenue;
      addOns.dropIn.transactions += addOnData.dropIn.transactions;
      addOns.punchPass.totalRevenue += addOnData.punchPass.totalRevenue;
      addOns.punchPass.sold += addOnData.punchPass.sold;
      addOns.punchPass.redeemed += addOnData.punchPass.redeemed;
      addOns.punchPass.expired += addOnData.punchPass.expired;
      grandTotal += addOnData.dropIn.totalRevenue + addOnData.punchPass.totalRevenue;
    }
  });

  addOns.dropIn.redemptionRate = addOns.dropIn.transactions > 0 ? (addOns.dropIn.transactions / (addOns.dropIn.transactions * 1.2)).toFixed(2) : 0;
  addOns.punchPass.redemptionRate = addOns.punchPass.sold > 0 ? (addOns.punchPass.redeemed / addOns.punchPass.sold).toFixed(2) : 0;
  addOns.dropIn.percentOfTotal = grandTotal > 0 ? ((addOns.dropIn.totalRevenue / grandTotal) * 100).toFixed(1) : 0;
  addOns.punchPass.percentOfTotal = grandTotal > 0 ? ((addOns.punchPass.totalRevenue / grandTotal) * 100).toFixed(1) : 0;

  return addOns;
}

  const streams = {
    memberships: { name: 'Memberships', value: 0, pct: 0, color: '#3b82f6' },
    training: { name: 'Personal training', value: 0, pct: 0, color: '#22c55e' },
    nutrition: { name: 'Nutrition / supplements', value: 0, pct: 0, color: '#f59e0b' },
    dropins: { name: 'Drop-ins & day passes', value: 0, pct: 0, color: '#ef4444' }
  };

  let total = 0;

  // Sum from SAMPLE_DATA streams for each location
  SAMPLE_DATA.streams.forEach((stream, idx) => {
    const val = parseInt(stream.value.replace(/[^0-9]/g, ''));
    const streamKey = idx === 0 ? 'memberships' : idx === 1 ? 'training' : idx === 2 ? 'nutrition' : 'dropins';
    streams[streamKey].value += val * locations.length;
    total += val * locations.length;
  });

  Object.keys(streams).forEach(key => {
    streams[key].pct = Math.round((streams[key].value / total) * 100);
    // Format value as currency string
    streams[key].meta = streams[key].value > 0 ? `${(streams[key].value / locations.length).toLocaleString()} per location` : 'No data';
    streams[key].value = '$' + streams[key].value.toLocaleString();
  });

  return Object.values(streams);
}

// Aggregate slot utilization across all locations
function aggregateSlotsData(clientKey) {
  if (clientKey !== 'rxfit') return null;

  const slots = SAMPLE_DATA.slots.map(slot => ({ ...slot }));
  // Average the percentages
  return slots.map(slot => ({
    ...slot,
    pct: Math.round(slot.pct)
  }));
}

// Aggregate coaches across all locations
function aggregateCoachesData(clientKey) {
  if (clientKey !== 'rxfit') return null;

  const locations = ['holladay', 'orem', 'spanish_fork'];
  const coachMap = {};

  locations.forEach(locKey => {
    SAMPLE_DATA.coaches.forEach(coach => {
      const revenue = parseInt(coach.revenue.replace('$', '').replace(/,/g, ''));
      if (!coachMap[coach.name]) {
        coachMap[coach.name] = { ...coach, revenue: revenue };
      } else {
        coachMap[coach.name].revenue += revenue;
      }
    });
  });

  return Object.values(coachMap)
    .sort((a, b) => b.revenue - a.revenue)
    .slice(0, 4)
    .map(coach => ({
      ...coach,
      revenue: '$' + coach.revenue.toLocaleString()
    }));
}

// Aggregate schedule across all locations
function aggregateScheduleData(clientKey) {
  if (clientKey !== 'rxfit') return null;

  const locations = ['holladay', 'orem', 'spanish_fork'];
  const schedules = [];

  locations.forEach(locKey => {
    const locSchedule = RXFIT_DATA.locations[locKey]?.schedule || [];
    schedules.push(...locSchedule);
  });

  return schedules;
}

// Aggregate revenue page data across all locations
function aggregateRevenueData(clientKey) {
  if (clientKey !== 'rxfit') return null;

  // For revenue page, sum key metrics
  const baseData = SAMPLE_DATA;
  return {
    period: baseData.period,
    syncTime: baseData.syncTime,
    kpis: aggregateKPIData(clientKey),
    streams: aggregateStreamsData(clientKey),
    coaches: aggregateCoachesData(clientKey)
  };
}

// Aggregate staff page data across all locations
function aggregateStaffData(clientKey) {
  if (clientKey !== 'rxfit') return null;

  return aggregateCoachesData(clientKey);
}

// Aggregate pace data across all locations
function aggregatePaceData(clientKey) {
  if (clientKey !== 'rxfit') return null;

  const baseGoal = 58000 * 3; // 3 locations
  const baseEarned = 42610 * 3;
  const baseProjected = 57340 * 3;

  return {
    goal: '$' + baseGoal.toLocaleString(),
    earned: '$' + baseEarned.toLocaleString(),
    projected: '$' + baseProjected.toLocaleString(),
    projClass: 'up',
    pct: 73,
    retNew: '+' + (22 * 3)
  };
}

function route(pageName) {
  if (!currentData) return; // Wait for data load

  // Update URL with page parameter
  const params = new URLSearchParams(window.location.search);
  params.set('page', pageName);
  window.history.pushState(
    { page: pageName },
    '',
    '?' + params.toString()
  );

  // Update current page state
  currentPage = pageName;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === pageName);
  });

  // Dispatch to page render function
  const pageRenders = {
    dashboard: renderDashboard,
    revenue: renderRevenue,
    staff: renderStaff,
    schedule: renderSchedule,
    report: renderMonthlyReport,
    memberships: renderMemberships,
    pace: renderPace,
    datasource: renderDataSource
  };

  const renderFn = pageRenders[pageName] || renderDashboard;
  renderFn(currentClient, currentData, currentIsLive);
}

      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } }
      }
    });

/* ═══════════════════════════════════════════════════════════════════
   NAV INTERACTIVITY
   Set up sidebar navigation using event delegation
═══════════════════════════════════════════════════════════════════ */
function setupNavigation() {
  const sidebar = document.querySelector('.sidebar');
  sidebar.addEventListener('click', (e) => {
    const navItem = e.target.closest('.nav-item');
    if (!navItem) return;

    const page = navItem.dataset.page;
    if (page) {
      route(page);
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════
   ROUTER — reads ?client= param and bootstraps the right data
═══════════════════════════════════════════════════════════════════ */
async function init() {
  const params  = new URLSearchParams(window.location.search);
  const key     = (params.get('client') || 'rxfit').toLowerCase();
  const client  = CLIENT_REGISTRY[key];
  const main    = document.getElementById('main-content');

  // MULTI-LOCATION: Read and validate location parameter
  const locationParam = params.get('location');
  const locations = getLocations(key);
  if (locationParam && locations.some(loc => loc.key === locationParam)) {
    currentLocation = locationParam;
  } else if (locations.length > 0) {
    currentLocation = locations[0].key;
    // Update URL with default location
    params.set('location', currentLocation);
    window.history.replaceState({}, '', `?${params.toString()}`);
  }

  // Unknown client
  if (!client) {
    const knownKeys = Object.keys(CLIENT_REGISTRY);
    main.innerHTML = `
      <div class="notfound">
        <div style="font-size:32px;opacity:.3;">?</div>
        <h2>Client not found: <code style="font-family:'DM Mono',monospace;font-size:17px;">${key}</code></h2>
        <p>No client with that key exists in the registry. Add it to <code>CLIENT_REGISTRY</code> in the dashboard file, or choose an existing client:</p>
        <div class="client-list">
          ${knownKeys.map(k => `<div class="client-chip" onclick="window.location.search='?client=${k}'">${k}</div>`).join('')}
        </div>
      </div>`;
    document.getElementById('sb-client-name').textContent = 'Unknown';
    document.getElementById('sb-client-meta').textContent = key;
    return;
  }

  // Show skeleton while loading
  main.innerHTML = `
    <div class="topbar">
      <div><div class="page-title">Loading…</div></div>
    </div>
    ${renderSkeleton()}`;

  try {
    let data, isLive;
    if (client.sheetId) {
      data   = await loadLiveData(key, client.sheetId);
      isLive = true;
    } else {
      // Simulate brief load for UX realism
      await new Promise(r => setTimeout(r, 400));
      data   = SAMPLE_DATA;
      isLive = false;
    }
    // Store global state
    currentClient = client;
    currentData = data;
    currentIsLive = isLive;

    // Route to initial page (or dashboard if not specified)
    const pageParams = new URLSearchParams(window.location.search);
    const initialPage = pageParams.get('page') || 'dashboard';
    route(initialPage);
  } catch (err) {
    main.innerHTML = `
      <div class="error-card" style="margin-top:40px;">
        <h3>Could not load data</h3>
        <p>There was a problem fetching data for <code>${client.name}</code>.<br>
        Check that the Google Sheet is published and the Sheet ID is correct.</p>
        <p style="margin-top:12px;font-size:12px;color:var(--red);font-family:'DM Mono',monospace;">${err.message}</p>
        <p style="margin-top:16px;">
          <span style="cursor:pointer;color:var(--blue);font-size:13px;" onclick="init()">↻ Retry</span>
          &nbsp;&nbsp;
          <span style="cursor:pointer;color:var(--muted);font-size:13px;" onclick="showConfigGuide()">Configure data source ›</span>
        </p>
      </div>`;
    document.getElementById('sb-client-name').textContent = client.name;
    document.getElementById('sb-client-meta').textContent = 'Error loading data';
  }
}

// Handle browser back/forward buttons
window.addEventListener('popstate', (e) => {
  if (currentData) {
    const params = new URLSearchParams(window.location.search);
    const page = params.get('page') || 'dashboard';
    // MULTI-LOCATION: Update location from URL if changed
    const locationParam = params.get('location');
    if (locationParam) {
      currentLocation = locationParam;
    }
    route(page);
  }
});

setupNavigation();
init();
</script>
